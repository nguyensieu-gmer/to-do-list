<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-list</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="default">
                <div class="user">
                    <div>
                        <i class="ri-user-3-fill"></i>
                        <span>Nguyen Sieu</span>
                    </div>
                    <i class="ri-notification-3-line"></i>
                </div>
                <div class="sidebar_item"><i class="ri-poker-hearts-fill"></i><a href="#" id="priority">priority</a></div>
                <div class="sidebar_item"><i class="ri-task-line"></i><a href="#" id="today">today</a></div>
                <div class="sidebar_item"><i class="ri-task-line"></i><a href="#" id="tomorow">tomorow</a></div>
                <div id="projects">
                    <div id="Add_project">
                        <i class="ri-add-circle-fill"></i>
                        <a href="#">Add project</a>
                    </div>
                    <div class="sidebar_item"><i class="ri-task-line"></i><a href="#">project 1</a></div>
                    <div class="sidebar_item"><i class="ri-task-line"></i><a href="#">project 2</a></div>
                    <div class="sidebar_item"><i class="ri-task-line"></i><a href="#">project 3</a></div>
                </div>
            </div>
        </div>

            <div id="project_name">
                <h1>project name</h1>
                <i class="ri-more-fill add"></i>
            </div>
            <div>
                <div class="todo_name">
                    <h2>to do name</h2>
                    <i class="ri-more-fill add"></i>
                </div>

                    <li class="task">
                        <div class="first">

                            <i class="ri-poker-hearts-fill"></i>

                            <p class="title">title</p>
                            <p>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task">

                            <input type="checkbox" name="" id="">
                        </div>
                        <div class="second">
                            <p class="title">title</p>
                            <p>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task add_todo">
                        <i class="ri-add-circle-fill"></i>
                        <a href="#">Add todo</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
