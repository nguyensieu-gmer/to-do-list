<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-list</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="default">
            <div class="user">
                <div>
                    <i class="ri-user-3-fill"></i>
                    <span>Nguyen Sieu</span>
                </div>
                <i class="ri-notification-3-line"></i>
            </div>
            <button class="sidebar_item">
                <i class="ri-poker-hearts-fill"></i>
                <p id="priority">priority</p>
            </button>
            <button class="sidebar_item">
                <i class="ri-task-line"></i>
                <p id="today">today</p>
            </button>
            <div id="projects">
                <button id="Add_project">
                    <i class="ri-add-circle-fill"></i>
                    <a href="#">Add project</a>
                </button>
                <div id="projectList">

                </div>
            </div>
        </div>
    </div>
    <div class="content">
        
    </div>
    <dialog id="Add_project_dialog">
        <form method="dialog">
            <div>
                <label for="new_project_name"></label>
                <input type="text" name="new_project_name" id="new_project_name">
            </div>
            <div>
                <button value="cancel" formmethod="dialog" type="submit">Cancel</button>
                <button value="create" type="submit">create</button>
            </div>
        </form>
    </dialog>
    <dialog id="modify_project_dialog">
        <form method="dialog">
            <button class="form_btn" value="add_todo">Add todo</button>
            <button class="form_btn" value="rename">Rename</button>
            <button class="form_btn" value="delete" id="delete_project_btn">Delete</button>
            <button class="form_btn" value="cancel">Cancel</button>
        </form>
    </dialog>
    <dialog id="confirm_project_dialog">
        <form method="dialog">
            <p>are you sure to delete this project</p>
            <button class="form_btn" value="cancel">Cancel</button>
            <button class="form_btn" value="yes">Yes</button>
        </form>
    </dialog>
    <dialog id="rename_project_dialog">
        <form method="dialog">
            <label for="input_new_project_name">new project name</label>
            <input type="text" name="input_new_project_name" id="input_new_project_name">
            <button value="cancel" class="form_btn">Cancel</button>
            <button value="rename" class="form_btn">Rename</button>
        </form>
    </dialog>
    <dialog id="add_todo_dialog">
        <form method="dialog">
            <div>
                <label for="input_todo_name">new todo name</label>
                <input type="text" name="input_todo_name" id="input_todo_name">
            </div>
            <button value="cancel" class="form_btn">Cancel</button>
            <button value="create" class="form_btn">Create</button>
        </form>
    </dialog>
    <dialog id="modify_todo_dialog">
        <form method="dialog">
            <button value="rename" class="form_btn">Rename</button>
            <button value="delete" class="form_btn">Delete</button>
            <button value="cancel" class="form_btn">Cancel</button>
        </form>
    </dialog>
    <dialog id="rename_todo_dialog">
        <form method="dialog">
            <label for="input_new_todo_name">new todo name</label>
            <input type="text" name="input_new_todo_name" id="input_new_todo_name">
            <button value="rename" class="form_btn">Rename</button>
            <button value="cancel" class="form_btn">Cancel</button>
        </form>
    </dialog>   
    <dialog id="delete_todo_dialog">
        <form method="dialog">
            <p>are you sure to delete this todo</p>
            <button class="form_btn" value="cancel">Cancel</button>
            <button class="form_btn" value="yes">Yes</button>
        </form>
    </dialog>
    <dialog id="add_task_dialog">
        <form method="dialog">
            <label for="input_task_title">Title</label>
            <input type="text" name="input_task_title" id="input_task_title">
            <label for="input_task_duedate">Due Date</label>
            <input type="time" name="input_task_duedate" id="input_task_duedate">
            <label for="input_task_priority">Do it matter?</label>
            <input type="checkbox" name="input_task_priority" id="input_task_priority">
            <label for="input_task_check">Did you do it?</label>
            <input type="checkbox" name="input_task_check" id="input_task_check">
            <button class="form_btn" value="cancel">Cancel</button>
            <button class="form_btn" value="add">Add Task</button>
        </form>
    </dialog>
    <dialog id="edit_task_dialog">
        <form method="dialog">
            <input type="text" name="input_edit_task_title">
            <input type="time" name="input_edit_task_duedate">
            <input type="checkbox" name="input_edit_task_priority">
            <input type="checkbox" name="input_edit_task_check">
            <button class="form_btn" value="cancel">Cancel</button>
            <button class="form_btn" value="delete">Delete Task</button>
            <button class="form_btn" value="Change">Change Task</button>
        </form>
    </dialog>
</div>
</body>
</html>
