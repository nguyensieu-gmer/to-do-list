<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-list</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="default">
                <div class="user">
                    <div>
                        <i class="ri-user-3-fill"></i>
                        <span>Nguyen Sieu</span>
                    </div>
                    <i class="ri-notification-3-line"></i>
                </div>
                <button class="sidebar_item">
                    <i class="ri-poker-hearts-fill"></i>
                    <p id="priority">priority</p>
                </button>
                <button class="sidebar_item">
                    <i class="ri-task-line"></i>
                    <p id="today">today</p>
                </button>
                <button class="sidebar_item">
                    <i class="ri-task-line"></i>
                    <p id="tomorow">tomorow</p>
                </button>
                <div id="projects">
                    <button id="Add_project">
                        <i class="ri-add-circle-fill"></i>
                        <a href="#">Add project</a>
                    </button>
                    <button class="sidebar_item">
                        <i class="ri-task-line"></i>
                        <p>project 1</p>
                    </button>
                    <button class="sidebar_item">
                        <i class="ri-task-line"></i>
                        <p>project 2</p>
                    </button>
                    <button class="sidebar_item">
                        <i class="ri-task-line"></i>
                        <p>project 3</p>
                    </button>
                </div>
            </div>
        </div>
        <div class="content">
            <div id="project_name">
                <h1>project name</h1>
                <button class="btn"><i class="ri-more-fill add"></i></button>
            </div>
            <div>
                <div class="todo_name">
                    <h2>to do name</h2>
                    <button class="btn"><i class="ri-more-fill add"></i></button>
                </div>
                <ul>
                    <li class="task">
                        <div class="first">
                            <input type="checkbox" name="" id="">
                        </div>
                        <div class="second">
                            <p class="title">title</p>
                            <p><i class="ri-time-fill"></i>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task">
                        <div class="first">
                            <input type="checkbox" name="" id="">
                        </div>
                        <div class="second">
                            <p class="title">title</p>
                            <p><i class="ri-time-fill"></i>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task">
                        <div class="first">
                            <input type="checkbox" name="" id="">
                        </div>
                        <div class="second">
                            <p class="title">title</p>
                            <p><i class="ri-time-fill"></i>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task">
                        <div class="first">
                            <input type="checkbox" name="" id="">
                        </div>
                        <div class="second">
                            <p class="title">title</p>
                            <p><i class="ri-time-fill"></i>time</p>
                        </div>
                        <div class="third">
                            <i class="ri-poker-hearts-fill"></i>
                            <button class="btn">edit<i class="ri-hashtag"></i></button>
                        </div>
                    </li>
                    <li class="task">
                        <button class="add_todo">
                            <i class="ri-add-circle-fill"></i>
                            <a href="#">Add todo</a>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
